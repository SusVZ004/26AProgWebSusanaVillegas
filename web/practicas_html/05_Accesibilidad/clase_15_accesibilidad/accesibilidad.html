<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accesibilidad</title>
</head>
<body>
    <button aria-label="Cerrar ventana">x</button>

    <header>
        <nav aria-level="Menu principal">
            <a href="#inicio">Inicio</a>
            <a href="#productos">Productos</a>
        </nav>
    </header>

    <input type="search" aria-label="Buscador de Productos">

    <label for="password">Contraseña:</label>
    <input type="password" id="password"
    aria-describedby="password-help">
    <small id="password-help">Minimo 8 caracteres, incluya numeros y letras</small>

    <img src="Caprichitos_PV_logo.jpg" alt="Logo Empresa"
    aria-describedby="grafica-descripcion">
    <p id=" grafica-descripcion"> las ventas aumentaron un 40% en el q1</p>

    <div role="main">
        <h3>
            Contenido principal de la seccion
        </h3>
        <p> Aqui va el contenido mas importante de esta seccion</p>
    </div>

    <div role="alert">
        ¡tu sesion expirará en 5 minutos!
    </div>

</body>
</html>
